name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    name: build-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - build: linux
            os: ubuntu-22.04
            rust: 1.78.0
            target: x86_64-unknown-linux-musl
            use-cross: true
            asset-ext: tar.gz
          - build: linux-arm
            os: ubuntu-22.04
            rust: 1.78.0
            target: arm-unknown-linux-gnueabihf
            use-cross: true
            asset-ext: tar.gz
          - build: macos
            os: macos-14
            rust: 1.78.0
            target: x86_64-apple-darwin
            use-cross: false
            asset-ext: tar.gz
          - build: win-msvc
            os: windows-2022
            rust: 1.78.0
            target: x86_64-pc-windows-msvc
            use-cross: false
            asset-ext: zip
          - build: win-gnu
            os: windows-2022
            rust: 1.78.0
            target: x86_64-pc-windows-gnu
            use-cross: false
            asset-ext: zip
    env:
      CARGO: cargo
      TARGET_FLAGS: --target ${{ matrix.target }}
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install packages (Ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        run: ci/ubuntu-install-packages

      - name: Install packages (macOS)
        if: matrix.os == 'macos-14'
        run: ci/macos-install-packages

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          target: ${{ matrix.target }}

      - name: Use Cross
        if: matrix.use-cross
        shell: bash
        run: |
          cargo install cross --locked
          echo "CARGO=cross" >> "$GITHUB_ENV"

      - name: Build release binary
        run: ${{ env.CARGO }} build --locked --release ${{ env.TARGET_FLAGS }}

      - name: Build archive
        shell: bash
        run: |
          staging="goto-rs-${RELEASE_VERSION}-${{ matrix.target }}"
          asset="${staging}.${{ matrix.asset-ext }}"
          mkdir -p "$staging"

          cp README.md CHANGELOG.md LICENSE "$staging/"

          if [[ "${{ matrix.os }}" == windows-* ]]; then
            cp "target/${{ matrix.target }}/release/goto-rs.exe" "$staging/"
            7z a "$asset" "$staging"
          else
            cp "target/${{ matrix.target }}/release/goto-rs" "$staging/"
            tar czf "$asset" "$staging"
          fi

          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  publish-release:
    name: publish-release
    needs: build-release
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create or update GitHub release
        shell: bash
        run: |
          if ! gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release create "$RELEASE_VERSION" --verify-tag --generate-notes
          fi
          gh release upload "$RELEASE_VERSION" dist/*/* --clobber

  cargo-publish:
    name: cargo publish
    needs: publish-release
    runs-on: ubuntu-22.04
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.78.0
          profile: minimal

      - name: Publish to crates.io
        run: cargo publish --locked
